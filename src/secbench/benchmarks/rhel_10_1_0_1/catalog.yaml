id: rhel_10_1_0_1
title: CIS Red Hat Enterprise Linux 10 Benchmark
version: 1.0.1
target: rhel
beta: true
description: |
  CIS Red Hat Enterprise Linux 10 Benchmark v1.0.1. Hardens filesystem,
  software / patch management, mandatory access control, banners,
  services, network parameters, logging and auditing, SSH and sudo
  configuration, and local account hygiene.

  Run on the local machine (when the app itself is on a Linux host) or
  on a remote RHEL host reached over SSH from the Connect >
  Infrastructure tab. Many checks require sudo on the target.

sections:
