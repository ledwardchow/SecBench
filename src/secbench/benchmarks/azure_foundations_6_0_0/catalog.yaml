        title: Ensure that Register with Microsoft Entra is enabled on App Service
        level: 1
      - id: CIS-AZ-FND-9.6
        title: Ensure that 'PHP version' is currently supported (if in use)
        level: 1
      - id: CIS-AZ-FND-9.7
        title: Ensure that 'Python version' is currently supported (if in use)
        level: 1
      - id: CIS-AZ-FND-9.8
        title: Ensure that 'Java version' is currently supported (if in use)
        level: 1
      - id: CIS-AZ-FND-9.9
        title: Ensure that 'HTTP Version' is the Latest, if Used to Run the Web App
        level: 1
      - id: CIS-AZ-FND-9.10
        title: Ensure FTP deployments are Disabled
        level: 1
      - id: CIS-AZ-FND-9.11
        title: Ensure Azure Key Vaults are Used to Store Secrets
        level: 2
        automated: false
  - id: "10"
    title: Miscellaneous
    controls:
      - id: CIS-AZ-FND-10.1
        title: Ensure that Resource Locks are set for Mission-Critical Azure Resources
        level: 2
        automated: false
