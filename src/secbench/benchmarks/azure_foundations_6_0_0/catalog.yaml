    title: AppService
    controls:
      - id: CIS-AZ-FND-9.1
        title: Ensure 'HTTPS Only' is set to 'On'
        level: 1
      - id: CIS-AZ-FND-9.2
        title: Ensure App Service Authentication is set up for apps in Azure App Service
        level: 2
